name: Build and deploy

# Branch to publish the built app to (used by GitHub Pages).
env:
  DEPLOY_BRANCH: gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm build

      - name: Publish dist to ${{ env.DEPLOY_BRANCH }}
        env:
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
        run: |
          set -euo pipefail
          cd dist
          touch .nojekyll
          git init -q -b "$DEPLOY_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} to ${DEPLOY_BRANCH}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${DEPLOY_BRANCH}"
